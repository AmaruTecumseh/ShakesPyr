<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ShakesPyr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4efe3;
    }

    header {
      background: #0f4c5c;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 160px;
      padding: 10px;
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 14px;
    }

    select, button {
      padding: 8px;
      margin-right: 8px;
      margin-bottom: 15px;
    }

    button {
      cursor: pointer;
    }

    #poemOutput {
      background: #ffffff;
      font-family: Georgia, serif;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<header>ShakesPyr</header>

<div class="container">

  <label><strong>Paste Code:</strong></label>
  <textarea id="codeInput">
def main():
    for i in range(1,6):
        print(i)
  </textarea>

  <label><strong>Style:</strong></label>
  <br>
  <select id="styleSelect">
    <option value="lyrical">Lyrical</option>
    <option value="shakespearean">Shakespearean</option>
    <option value="noir">Noir</option>
    <option value="sci-fi">Sci-Fi</option>
    <option value="biblical">Biblical</option>
  </select>

  <button id="generateBtn">Generate Poetry</button>

  <br>

  <label><strong>Poem:</strong></label>
  <textarea id="poemOutput" readonly></textarea>

</div>

<script>
async function generatePoem(codeInput, style) {
  try {

    // Step 1: Create temp user
    const signup = await fetch("https://puter.com/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ is_temp: true })
    });

    const signupData = await signup.json();
    const token = signupData.token;

    if (!token) {
      throw new Error("No token returned from Puter.");
    }

    const stylePrompts = {
      lyrical: "Transform this programming code into expressive lyrical free verse.",
      shakespearean: "Transform this programming code into Shakespearean dramatic poetry.",
      noir: "Transform this programming code into dark noir monologue prose-poetry.",
      "sci-fi": "Transform this programming code into futuristic sci-fi poetic narration.",
      biblical: "Transform this programming code into prophetic biblical poetic scripture."
    };

    // Step 2: Call Puter AI driver
    const aiCall = await fetch("https://api.puter.com/drivers/call", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        interface: "puter-chat-completion",
        driver: "openai-completion",
        method: "complete",
        test_mode: false,
        args: {
          model: "gpt-4o-mini",
          stream: false,
          messages: [
            {
              role: "system",
              content: "You transform programming code into refined literary poetry. Never output code. Only output artistic verse."
            },
            {
              role: "user",
              content: stylePrompts[style] + "\n\nCode:\n" + codeInput
            }
          ]
        }
      })
    });

    const result = await aiCall.json();

    return result?.result?.message?.content || "No poem returned.";

  } catch (err) {
    console.error(err);
    return "Generation failed. Check console for details.";
  }
}

document.getElementById("generateBtn").addEventListener("click", async () => {

  const input = document.getElementById("codeInput").value;
  const style = document.getElementById("styleSelect").value;
  const outputBox = document.getElementById("poemOutput");

  outputBox.value = "Generating...";

  const poem = await generatePoem(input, style);

  outputBox.value = poem;
});
</script>

</body>
</html>
